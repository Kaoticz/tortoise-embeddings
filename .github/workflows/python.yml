name: tortoise-embedding Test CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.x"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Run mypy
        run: mypy tortoise_embeddings/
      - name: Run basedpyright
        run: basedpyright tortoise_embeddings/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18-trixie
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: tortoise-embeddings-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.x"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m venv ./.venv
          source ./.venv/bin/activate
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Run tests
        env:
          PSQL_CONNECTION_STRING: postgres://postgres:password@localhost:5432/tortoise-embeddings-test
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          touch ./tests/__init__.py
          source ./.venv/bin/activate
          pytest ./tests/
          rm ./tests/__init__.py
